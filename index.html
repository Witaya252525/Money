<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buck2Bar — Income & Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="bg-light">
    <header class="py-3 bg-white shadow-sm">
      <div class="container d-flex align-items-center gap-3">
        <i class="bi bi-currency-dollar fs-2 text-success"></i>
        <h1 class="h4 mb-0">Buck2Bar</h1>
      </div>
    </header>

    <main class="container my-4">
      <!-- Login Card -->
      <div class="card mb-4 shadow-sm" style="max-width:480px;">
        <div class="card-body">
          <h5 class="card-title mb-3">Login</h5>
          <form id="loginForm" onsubmit="return false;">
            <div class="mb-3">
              <label for="emailInput" class="form-label">Email</label>
              <input type="email" class="form-control" id="emailInput" placeholder="user@example.com" required />
            </div>
            <div class="mb-3">
              <label for="passwordInput" class="form-label">Password</label>
              <input type="password" class="form-control" id="passwordInput" placeholder="At least 10 chars, 1 uppercase, 1 special" required />
            </div>
            <button id="loginBtn" type="button" class="btn btn-primary w-100">Login</button>
          </form>
          <div id="loginFeedback" class="mt-3 text-danger small"></div>
        </div>
      </div>

      <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data" type="button" role="tab" aria-controls="data" aria-selected="true">
            <i class="bi bi-list-check me-1"></i> Data
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart" type="button" role="tab" aria-controls="chart" aria-selected="false">
            <i class="bi bi-bar-chart-line me-1"></i> Chart
          </button>
        </li>
      </ul>

      <div class="tab-content mt-3">
        <div class="tab-pane fade show active" id="data" role="tabpanel" aria-labelledby="data-tab">
          <form id="dataForm">
            <div class="row">
              <div class="col-lg-8">
                <div class="table-responsive">
                  <table class="table table-sm align-middle">
                    <thead>
                      <tr>
                        <th>Month</th>
                        <th class="text-end">Income</th>
                        <th class="text-end">Expense</th>
                      </tr>
                    </thead>
                    <tbody id="monthsBody"></tbody>
                  </table>
                </div>
              </div>
              <div class="col-lg-4">
                <div class="card p-3">
                  <h5 class="card-title">Actions</h5>
                  <div class="d-grid gap-2">
                    <button id="randomBtn" type="button" class="btn btn-outline-primary">Randomize</button>
                    <button id="saveBtn" type="button" class="btn btn-primary">Save / Update</button>
                    <button id="clearBtn" type="button" class="btn btn-outline-danger">Clear Data</button>
                  </div>
                  <div id="formFeedback" class="mt-3 text-danger small"></div>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="tab-pane fade" id="chart" role="tabpanel" aria-labelledby="chart-tab">
          <div class="card p-3 position-relative">
            <div class="d-flex justify-content-end mb-2">
              <button id="downloadBtn" type="button" class="btn btn-outline-secondary btn-sm" title="Download chart">
                <i class="bi bi-download"></i>
              </button>
            </div>
            <canvas id="moneyChart" height="240"></canvas>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast for login success -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080;">
      <div id="loginToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div id="loginToastBody" class="toast-body">Login successful</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
